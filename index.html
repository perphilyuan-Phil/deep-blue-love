<!-- Deep Blue Plan - Heart Select (FIXED DEPLOYABLE VERSION) -->
<!-- This version fixes deployment issues by removing Next.js dependency -->
<!-- It is a pure static page that works on Vercel immediately -->

<!DOCTYPE html>
<html lang='zh'>
<head>
<meta charset='UTF-8' />
<meta name='viewport' content='width=device-width, initial-scale=1.0'/>
<title>深蓝计划·心动选择</title>
<script src='https://unpkg.com/react@18/umd/react.production.min.js'></script>
<script src='https://unpkg.com/react-dom@18/umd/react-dom.production.min.js'></script>
<script src='https://unpkg.com/@babel/standalone/babel.min.js'></script>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(to bottom,#020617,#0b2a4a);color:white}
.container{max-width:420px;margin:0 auto;padding:20px}
.card{background:rgba(255,255,255,0.08);padding:16px;border-radius:16px}
.btn{padding:12px;border-radius:12px;border:none;color:white}
.blue{background:#2563eb}
.green{background:#10b981}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item{padding:10px;border-radius:12px;background:rgba(255,255,255,0.08);text-align:center}
.selected{background:#3b82f6}
.small{font-size:12px;opacity:0.8}
</style>
</head>
<body>
<div id='root'></div>

<script type='text/babel'>
function App(){
 const [selected,setSelected]=React.useState([])
 const [submitted,setSubmitted]=React.useState(false)
 const guests=Array.from({length:20},(_,i)=>(i+1).toString().padStart(2,'0'))

 function toggle(i){
  if(submitted) return
  if(selected.includes(i)) setSelected(selected.filter(x=>x!==i))
  else if(selected.length<3) setSelected([...selected,i])
 }

 return (
  <div className='container'>
    <h1 style={{textAlign:'center'}}>深蓝计划</h1>
    <p style={{textAlign:'center',color:'#93c5fd'}}>心动选择</p>

    <div className='card'>
      <div className='grid'>
        {guests.map((g,i)=>(
          <div key={i} className={'item '+(selected.includes(i)?'selected':'')} onClick={()=>toggle(i)}>
            👤<br/> {g}号
          </div>
        ))}
      </div>

      <p className='small' style={{textAlign:'center'}}>已选择 {selected.length}/3</p>

      <button className='btn green' style={{width:'100%',marginTop:10}}
       onClick={()=>setSubmitted(true)}
      >提交选择</button>

      {submitted && <p style={{textAlign:'center',color:'#34d399'}}>提交成功</p>}
    </div>
  </div>
 )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
